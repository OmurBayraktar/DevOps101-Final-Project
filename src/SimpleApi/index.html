<!DOCTYPE html>
<html lang="tr" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps 101 API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #12121a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 3rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
        }

        .btn-custom-glow {
            font-weight: 500;
            letter-spacing: 0.5px;
            padding: 12px 24px;
            margin: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-custom-glow:hover {
            box-shadow: 0 0 15px currentColor;
            transform: translateY(-2px);
        }

        .icon-bounce {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }
    </style>
</head>

<body>
    <div class="glass-card">
        <i class="bi bi-rocket-takeoff text-primary fs-1 mb-3 icon-bounce d-inline-block"></i>
        <h1 class="fw-bold mb-2">DevOps 101 API</h1>
        <p class="text-secondary mb-4">Uygulamanız başarıyla yayına alındı. Lütfen test etmek istediğiniz servisi seçin:
        </p>

        <div class="d-flex flex-column flex-sm-row justify-content-center gap-2">
            <a href="/health" class="btn btn-outline-success btn-custom-glow">
                <i class="bi bi-heart-pulse me-2"></i>Health Check
            </a>
            <a href="/api/info" class="btn btn-outline-info btn-custom-glow">
                <i class="bi bi-info-circle me-2"></i>API Info
            </a>
        </div>

        <div class="mt-4 pt-4 border-top border-secondary border-opacity-25">
            <small class="text-muted"><i class="bi bi-github me-1"></i> CI/CD Pipeline ile otomatik kurulmuştur.</small>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
