name: Deploy Application

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/SimpleApi.Tests/SimpleApi.Tests.csproj

      - name: Build
        run: dotnet build src/SimpleApi.Tests/SimpleApi.Tests.csproj --no-restore

      - name: Test
        run: dotnet test src/SimpleApi.Tests/SimpleApi.Tests.csproj --no-build --verbosity normal

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPN_USER }}
          username: ${{ secrets.VPN_USER }}
          password: ${{ secrets.VPN_PASSWORD }}
          source: "."
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Start Docker Compose on VPS
        uses: appleboy/ssh-action@master
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          APP_PORT: ${{ secrets.APP_PORT }}
          STUDENT_NAME: ${{ secrets.STUDENT_NAME }}
        with:
          host: ${{ secrets.VPN_USER }}
          username: ${{ secrets.VPN_USER }}
          password: ${{ secrets.VPN_PASSWORD }}
          envs: DEPLOY_PATH,APP_PORT,STUDENT_NAME
          script: |
            cd $DEPLOY_PATH
            echo "APP_PORT=$APP_PORT" > .env
            echo "ASPNETCORE_ENVIRONMENT=Production" >> .env
            echo "STUDENT_NAME=$STUDENT_NAME" >> .env
            docker compose down
            docker compose up --build -d
